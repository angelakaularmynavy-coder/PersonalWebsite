<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A. Michelle Kaul - Contact</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            font-size: 18px;
            background-color: #f5e6e0;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }
       
        .contact-container {
            background-color: #fdf0eb;
            border: 2px solid #5c3317;
            border-radius: 10px;
            padding: 50px 60px;
            max-width: 620px;
            width: 100%;
            box-shadow: 0 6px 20px rgba(92, 51, 23, 0.2);
        }

        h1 {
            font-family: 'Georgia', serif;
            font-size: 32px;
            color: #000000;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .divider {
            border: none;
            border-top: 1px solid #5c3317;
            margin: 16px auto 24px auto;
            width: 70%;
        }

        .subtitle {
            font-family: 'Georgia', serif;
            font-size: 18px;
            text-align: center;
            color: #000000;
            margin-bottom: 36px;
            font-style: italic;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        label {
            font-family: 'Georgia', serif;
            font-size: 18px;
            color: #000000;
            margin-bottom: 6px;
            display: block;
        }

        input[type="text"],
        input[type="email"] {
            font-family: 'Georgia', serif;
            font-size: 18px;
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #5c3317;
            border-radius: 5px;
            background-color: #fff8f5;
            color: #000000;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        textarea {
            font-family: 'Georgia', serif;
            font-size: 18px;
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #5c3317;
            border-radius: 5px;
            background-color: #fff8f5;
            color: #000000;
            height: 160px;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            border-color: #3b1f0a;
            box-shadow: 0 0 6px rgba(92, 51, 23, 0.35);
        }

        .email-link-section {
            text-align: center;
            margin-top: 10px;
        }

        .email-link-section p {
            font-family: 'Georgia', serif;
            font-size: 18px;
            color: #000000;
            margin-bottom: 8px;
            font-style: italic;
        }

        .email-link {
            font-family: 'Georgia', serif;
            font-size: 18px;
            color: #5c3317;
            text-decoration: underline;
            font-weight: bold;
            transition: color 0.3s ease;
        }

        .email-link:hover {
            color: #3b1f0a;
        }

        .submit-btn {
            font-family: 'Georgia', serif;
            font-size: 18px;
            background-color: #5c3317;
            color: #fdf0eb;
            border: 2px solid #5c3317;
            border-radius: 5px;
            padding: 12px 28px;
            cursor: pointer;
            width: 100%;
            letter-spacing: 0.5px;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #3b1f0a;
            border-color: #3b1f0a;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-family: 'Georgia', serif;
            font-size: 15px;
            color: #5c3317;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="contact-container">

        <h1>A. Michelle Kaul</h1>
        <hr class="divider">

        <p class="subtitle">Contact me &mdash; I'd love to hear from you.</p>

        <form action="mailto:amichellekaul@email.com" method="post" enctype="text/plain">

            <div>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your name">
            </div>

            <div>
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address">
            </div>

            <div>
                <label for="message">Personal Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Send Message</button>

        </form>

        <div class="email-link-section">
            <p>Or reach me directly:</p>
            <a href="mailto:amichellekaul@email.com" class="email-link">
                amichellekaul@email.com
            </a>
        </div>

        <p class="footer-note">&copy; 2026 A. Michelle Kaul &mdash; All rights reserved.</p>

    </div>

</body>
</html>
